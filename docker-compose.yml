services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - synapse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    networks:
      - synapse_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: synapse-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    ports:
      - "8080:8080"
    networks:
      - synapse_net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  orthanc-onprem:
    image: orthancteam/orthanc:24.7.2
    container_name: synapse-orthanc-onprem
    volumes:
      - ./orthanc/on-prem/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_onprem_data:/var/lib/orthanc/db
    ports:
      - "4242:4242"
      - "8042:8042"
    networks:
      - synapse_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8042/system')"]
      interval: 10s
      timeout: 5s
      retries: 10

  orthanc-cloud:
    image: orthancteam/orthanc:24.7.2
    container_name: synapse-orthanc-cloud
    volumes:
      - ./orthanc/cloud/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_cloud_data:/var/lib/orthanc/db
    ports:
      - "8043:8042"
    networks:
      - synapse_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8042/system')"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: synapse-ollama
    entrypoint: ["/bin/sh", "/scripts/ollama-entrypoint.sh"]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/scripts/ollama-entrypoint.sh:ro
    ports:
      - "11434:11434"
    networks:
      - synapse_net
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-backend
    command: >
      sh -c "alembic upgrade head &&
             python scripts/manage_partitions.py &&
             python scripts/seed_data.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-synapse}:${POSTGRES_PASSWORD:-synapse_secret}@postgres:5432/${POSTGRES_DB:-synapse}
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_URL: http://keycloak:8080
      OLLAMA_BASE_URL: http://ollama:11434
      ORTHANC_ONPREM_DICOMWEB_URL: http://orthanc-onprem:8042/dicom-web
      ORTHANC_CLOUD_DICOMWEB_URL: http://orthanc-cloud:8042/dicom-web
      TEMP_STORAGE_PATH: /data/temp_dicom
    volumes:
      - ./backend:/app
      - temp_dicom:/data/temp_dicom
    ports:
      - "8000:8000"
      - "11112:11112"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      orthanc-onprem:
        condition: service_healthy
      orthanc-cloud:
        condition: service_healthy
    networks:
      - synapse_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  celery-routing:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-celery-routing
    command: celery -A celery_app worker -Q routing_queue -c ${CELERY_ROUTING_CONCURRENCY:-4} --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-synapse}:${POSTGRES_PASSWORD:-synapse_secret}@postgres:5432/${POSTGRES_DB:-synapse}
      REDIS_URL: redis://redis:6379/0
      TEMP_STORAGE_PATH: /data/temp_dicom
    volumes:
      - ./backend:/app
      - temp_dicom:/data/temp_dicom
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - synapse_net

  celery-migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-celery-migration
    command: celery -A celery_app worker -Q migration_queue -c ${CELERY_MIGRATION_CONCURRENCY:-2} --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-synapse}:${POSTGRES_PASSWORD:-synapse_secret}@postgres:5432/${POSTGRES_DB:-synapse}
      REDIS_URL: redis://redis:6379/0
      TEMP_STORAGE_PATH: /data/temp_dicom
    volumes:
      - ./backend:/app
      - temp_dicom:/data/temp_dicom
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - synapse_net

  partition-maintenance:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-partition-maintenance
    command: sh /app/scripts/partition_maintenance_loop.sh
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-synapse}:${POSTGRES_PASSWORD:-synapse_secret}@postgres:5432/${POSTGRES_DB:-synapse}
      PARTITION_MAINTENANCE_INTERVAL_SECONDS: ${PARTITION_MAINTENANCE_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - synapse_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: synapse-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - synapse_net

networks:
  synapse_net:
    driver: bridge

volumes:
  postgres_data:
  orthanc_onprem_data:
  orthanc_cloud_data:
  ollama_data:
  temp_dicom:
