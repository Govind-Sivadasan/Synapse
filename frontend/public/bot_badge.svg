<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="38%" stop-color="#29B6F6"/>
      <stop offset="62%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#C6FF00"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cyanEye" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </radialGradient>
    <radialGradient id="greenEye" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#AED581"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </radialGradient>
    <radialGradient id="antennaGlow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#B2FF59"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#brandGrad)"/>
  </g>
  <rect x="32" y="32" width="448" height="220" rx="96" fill="url(#gloss)"/>

  <g filter="url(#glow)">
    <line x1="256" y1="120" x2="256" y2="172" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-opacity="0.6"/>
    <circle cx="256" cy="108" r="20" fill="url(#antennaGlow)"/>
  </g>

  <rect x="100" y="172" width="312" height="232" rx="48" fill="#0A1929" fill-opacity="0.85"/>
  <rect x="100" y="172" width="312" height="232" rx="48" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="3"/>

  <g filter="url(#glow)">
    <rect x="148" y="232" width="72" height="92" rx="36" fill="url(#cyanEye)"/>
    <rect x="292" y="232" width="72" height="92" rx="36" fill="url(#greenEye)"/>
  </g>

  <path d="M180 356 Q256 392 332 356" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none" stroke-opacity="0.85"/>
</svg>